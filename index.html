<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main class="main-container">
    <div class="card">
      <div class="card-content-container">
        <div class="image-container">
          <img src="./assets/images/illustration-article.svg" alt="Article image">
        </div>
        <div class="text-container">
          <div class="category-container">
            <p class="category-title text-preset-3">Learning</p>
          </div>
          <div class="publish-date-container">
            <time class="publish-date text-preset-3" datetime="2023-12-21" aria-label="Published 21 December 2023">
              Published 21 Dec 2023
            </time>
          </div>
          <div class="title-container">
            <h1 class="title text-preset-1">HTML &amp; CSS foundations</h1>
          </div>
          <div class="description-container">
            <p class="description text-preset-2">
              These languages are the backbone of every website, defining structure, content, and presentation.
            </p>
          </div>
        </div>
        <div class="author-container">
          <img src="./assets/images/image-avatar.webp" alt="Avatar image of Greg Hooper" class="avatar">
          <p class="author text-preset-3">Greg Hooper</p>
        </div>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Ryan Evans</a>.
  </footer>
</body>
</html>
